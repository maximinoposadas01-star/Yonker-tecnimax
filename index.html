<script>
var PIN='1234',URL_GAS='https://script.google.com/macros/s/AKfycbzLTHNWU4jMlScsM9FjErKTPwJ4cZ9ft38tYBMczX5Uj4IYYRZXwbeEPcZTUln9xgtN/exec';
var VEHI={Honda:['CR-V','Civic','HR-V','Fit','Pilot','Accord'],Toyota:['Corolla','Tacoma','RAV4','Matrix','Yaris','4Runner'],Nissan:['Frontier','Pathfinder','Rogue','Sentra'],Hyundai:['Palisade','Santa Fe','Tucson','Elantra','Sonata','Accent'],Kia:['Sorento','Sportage','Forte','Soul'],Chevrolet:['Spark','Cruze','Equinox','Silverado'],Jeep:['Wrangler','Patriot','Cherokee','Grand Cherokee'],Ford:['Bronco','F-150','Escape','Focus','Expedition','Explorer'],Otro:['(en notas)']};
var NOM={vendedor:['ADONIS','HAROLD','BULNES','OSCAR','NOE','LUIS'],buscador:['AXEL','ISAAC','PAISA','ANTONI','ROGER','CRISTHIAN'],admin:['ADONIS']};
var RAZONES_NO_VENTA=['DIFERENTE','PRECIO','DAÑADO','NO LE GUSTO','OTRO'];
var ST={role:null,name:'',sols:[],url:URL_GAS},LS='tmx7';
function save(){localStorage.setItem(LS,JSON.stringify({role:ST.role,name:ST.name,url:ST.url}));}
function load(){try{var s=JSON.parse(localStorage.getItem(LS));if(s&&s.role&&s.name){ST.role=s.role;ST.name=s.name;ST.url=s.url||URL_GAS;return true;}}catch(e){}return false;}
function initM(){var s=$('fMarca');if(!s)return;s.innerHTML='<option value="">Marca...</option>';Object.keys(VEHI).forEach(function(m){s.innerHTML+='<option value="'+m+'">'+m+'</option>';});}
function updateModelos(){var m=$('fMarca').value,s=$('fModelo');s.innerHTML='<option value="">Modelo...</option>';if(m&&VEHI[m])VEHI[m].forEach(function(v){s.innerHTML+='<option value="'+v+'">'+v+'</option>';});}
function $(id){return document.getElementById(id);}

var pendF=[];
function handleFiles(inp){Array.from(inp.files).forEach(function(f){if(f.size>25e6)return;var isI=f.type.startsWith('image/'),isV=f.type.startsWith('video/');if(!isI&&!isV)return;if(isI)compImg(f).then(function(r){pendF.push({file:r.blob,prev:r.du,type:'image',name:f.name,mime:r.blob.type});rPrev();});else{pendF.push({file:f,prev:URL.createObjectURL(f),type:'video',name:f.name,mime:f.type});rPrev();}});inp.value='';}
function compImg(f){return new Promise(function(res){var img=new Image();img.onload=function(){var w=img.width,h=img.height,mx=800;if(w>mx||h>mx){var r=Math.min(mx/w,mx/h);w=Math.round(w*r);h=Math.round(h*r);}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(function(b){res({blob:b,du:c.toDataURL('image/jpeg',0.5)});},'image/jpeg',0.5);};img.src=URL.createObjectURL(f);});}
function rPrev(){$('filePreviews').innerHTML=pendF.map(function(f,i){return '<div class="file-preview-item">'+(f.type==='image'?'<img src="'+f.prev+'">':'<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.4rem">▶</div>')+'<button class="remove-file" onclick="pendF.splice('+i+',1);rPrev()">✕</button><div class="file-size">'+fSz(f.file.size)+'</div></div>';}).join('');}
function fSz(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(0)+'KB':(b/1048576).toFixed(1)+'MB';}
function toB64(f){return new Promise(function(r,j){var rd=new FileReader();rd.onload=function(){r(rd.result.split(',')[1]);};rd.onerror=j;rd.readAsDataURL(f);});}

function upFile(sid,f){return toB64(f.file).then(function(b64){return fetch(ST.url,{method:'POST',redirect:'follow',body:JSON.stringify({accion:'upload',solicitudId:sid.replace('_ev',''),fileName:f.name,mimeType:f.mime,base64:b64})}).then(function(r){return r.json().catch(function(){return r.text().then(function(t){var m=t.match(/href="([^"]+)"/);return m?fetch(m[1]).then(function(r2){return r2.json();}):null;});});}).then(function(d){if(d&&d.ok&&d.fileUrl)return{url:d.fileUrl,type:f.type,name:f.name};return upChunks(sid,f,b64);}).catch(function(){return upChunks(sid,f,b64);});});}
function upChunks(sid,f,b64){var C=6000,ch=[];for(var i=0;i<b64.length;i+=C)ch.push(b64.slice(i,i+C));return api({accion:'uploadInit',solicitudId:sid,fileName:f.name,mimeType:f.mime,totalChunks:ch.length}).then(function(ir){if(!ir||!ir.ok)return null;var p=Promise.resolve();ch.forEach(function(c,i){p=p.then(function(){return api({accion:'uploadChunk',uploadId:ir.uploadId,chunkIndex:i,data:c});});});return p.then(function(){return api({accion:'uploadFinalize',uploadId:ir.uploadId});}).then(function(fr){return fr&&fr.ok&&fr.fileUrl?{url:fr.fileUrl,type:f.type,name:f.name}:null;});});}

function api(p){return new Promise(function(res){var cb='_c'+Date.now()+Math.random().toString(36).slice(2,6);window[cb]=function(d){delete window[cb];res(d);};var s=document.createElement('script');p.callback=cb;s.src=ST.url+'?'+new URLSearchParams(p);s.onerror=function(){delete window[cb];res(null);};document.body.appendChild(s);setTimeout(function(){if(window[cb]){delete window[cb];res(null);}try{s.remove();}catch(e){}},15000);});}

function crearSolicitud(){var pieza=$('fPieza').value.trim(),marca=$('fMarca').value,modelo=$('fModelo').value,anio=$('fAnio').value.trim(),cliente=$('fCliente').value.trim(),notas=$('fNotas').value.trim();if(!pieza||!marca||!modelo){toast('Campos obligatorios','error');return;}var btn=$('btnEnviar');btn.disabled=true;btn.textContent='⏳...';var id='SOL-'+Date.now().toString(36).toUpperCase();api({accion:'crear',id:id,pieza:pieza,marca:marca,modelo:modelo,anio:anio,cliente:cliente,urgencia:urg,notas:notas,archivos:'[]',vendedor:ST.name,fecha:new Date().toISOString()}).then(function(r){if(!r||!r.ok){toast('Error','error');btn.disabled=false;btn.textContent='📤 Enviar';return;}if(!pendF.length){done();return;}var pg=$('uploadProgress'),fl=$('progressFill'),tx=$('progressText');pg.classList.add('show');var chain=Promise.resolve();pendF.forEach(function(f,i){chain=chain.then(function(){tx.textContent='Subiendo '+(i+1)+'/'+pendF.length;fl.style.width=((i+1)/pendF.length*100)+'%';return upFile(id,f);});});chain.then(function(){tx.textContent='✓';setTimeout(function(){pg.classList.remove('show');},1500);done();});function done(){btn.disabled=false;btn.textContent='📤 Enviar';toast('✓ '+id);clrForm();loadD();}});}
function clrForm(){['fPieza','fAnio','fCliente','fNotas'].forEach(function(id){$(id).value='';});$('fMarca').selectedIndex=0;updateModelos();pendF=[];rPrev();urg='Normal';document.querySelectorAll('.urgency-pill').forEach(function(p){p.classList.remove('selected','normal','urgente','critico');});document.querySelector('[data-val="Normal"]').classList.add('selected','normal');}

function loadD(){api({accion:'listar'}).then(function(r){if(r&&r.data){ST.sols=r.data.map(function(s){['archivos','archivosBuscador'].forEach(function(k){if(typeof s[k]==='string'&&s[k]){try{s[k]=JSON.parse(s[k]);}catch(e){s[k]=[];}}if(!Array.isArray(s[k]))s[k]=[];});return s;});}renderAll();});}

function renderAll(){if(ST.role==='vendedor'){rMis();rTodas();}else if(ST.role==='buscador'){rPen();rMiasB();rHist();}else{rAdmin();rStats();}}
function rMis(){var l=ST.sols.filter(function(s){return s.vendedor===ST.name&&s.estado!=='Archivado';});$('badgeMis').textContent=l.length;var el=$('listMis');if(!l.length){el.innerHTML=emp('📋','Sin solicitudes');return;}el.innerHTML=l.sort(byF).map(function(s){return card(s,'vendedor');}).join('');}
function rTodas(){var l=ST.sols.filter(function(s){return s.estado!=='Archivado';});$('badgeTodas').textContent=l.length;$('listTodas').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'vendedor-todas');}).join(''):emp('📋','Sin solicitudes');}
function rPen(){var l=ST.sols.filter(function(s){return s.estado==='Pendiente';});$('badgePend').textContent=l.length;$('listPendientes').innerHTML=l.length?l.sort(function(a,b){var u={'Crítico':0,'Urgente':1,'Normal':2};return(u[a.urgencia]||2)-(u[b.urgencia]||2)||new Date(b.fecha)-new Date(a.fecha);}).map(function(s){return card(s,'buscador');}).join(''):emp('🎉','Sin pendientes');}
function rMiasB(){var l=ST.sols.filter(function(s){return s.buscador===ST.name&&s.estado==='Buscando';});$('badgeMias').textContent=l.length;$('listMias').innerHTML=l.length?l.map(function(s){return card(s,'buscador-activa');}).join(''):emp('🔍','Sin activas');}
function rHist(){var l=ST.sols.filter(function(s){return s.buscador===ST.name&&(s.estado==='Encontrado'||s.estado==='No Encontrado'||s.estado==='Vendido'||s.estado==='No Vendido');});$('listHistorial').innerHTML=l.length?l.sort(function(a,b){return new Date(b.fechaResultado||b.fecha)-new Date(a.fechaResultado||a.fecha);}).map(function(s){return card(s,'historial');}).join(''):emp('📜','Sin historial');}
function rAdmin(){var l=ST.sols.filter(function(s){return s.estado!=='Archivado';});$('badgeAdmin').textContent=l.length;$('listAdmin').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'admin');}).join(''):emp('📋','Sin órdenes');}
function byF(a,b){return new Date(b.fecha)-new Date(a.fecha);}

function rStats(){
  var s=ST.sols,pend=0,busc=0,enc=0,noE=0,vend=0,noV=0,tot=s.length;
  s.forEach(function(x){if(x.estado==='Pendiente')pend++;else if(x.estado==='Buscando')busc++;else if(x.estado==='Encontrado')enc++;else if(x.estado==='No Encontrado')noE++;else if(x.estado==='Vendido')vend++;else if(x.estado==='No Vendido')noV++;});
  var tasaEnc=enc+noE+vend+noV>0?Math.round((enc+vend+noV)/(enc+noE+vend+noV)*100):0;
  var tasaVenta=enc+vend+noV>0?Math.round(vend/(vend+noV)*100):0;
  // Buscadores
  var bk={};s.forEach(function(x){if(!x.buscador||x.estado==='Pendiente'||x.estado==='Archivado')return;if(!bk[x.buscador])bk[x.buscador]={n:x.buscador,e:0,ne:0,a:0,v:0,nv:0,t:[]};var b=bk[x.buscador];if(x.estado==='Buscando')b.a++;if(x.estado==='Encontrado'||x.estado==='Vendido'||x.estado==='No Vendido'){b.e++;if(x.fecha&&x.fechaResultado){var m=Math.round((new Date(x.fechaResultado)-new Date(x.fecha))/60000);if(m>0&&m<1440)b.t.push(m);}}if(x.estado==='No Encontrado')b.ne++;if(x.estado==='Vendido')b.v++;if(x.estado==='No Vendido')b.nv++;});
  var bl=Object.values(bk).sort(function(a,b){var ta=a.e+a.ne>0?(a.e/(a.e+a.ne)):0;var tb=b.e+b.ne>0?(b.e/(b.e+b.ne)):0;return tb-ta;});
  var rk='';if(bl.length){rk='<div style="margin-top:20px"><div class="section-title">Rendimiento por Buscador</div><table class="rank-table"><tr><th>Buscador</th><th>✅</th><th>❌</th><th>📊</th><th>⏱</th></tr>';bl.forEach(function(b){var avg=b.t.length?Math.round(b.t.reduce(function(a,c){return a+c;},0)/b.t.length):'-';var tasa=b.e+b.ne>0?Math.round(b.e/(b.e+b.ne)*100):0;rk+='<tr><td style="font-weight:600">'+esc(b.n)+'</td><td style="color:var(--green)">'+b.e+'</td><td style="color:var(--red)">'+b.ne+'</td><td style="color:var(--accent)">'+tasa+'%</td><td>'+(avg==='-'?'-':avg+'m')+'</td></tr>';});rk+='</table></div>';}
  // Vendedores + ventas
  var vk={};s.forEach(function(x){if(!x.vendedor||x.estado==='Archivado')return;if(!vk[x.vendedor])vk[x.vendedor]={n:x.vendedor,tot:0,v:0};vk[x.vendedor].tot++;if(x.estado==='Vendido')vk[x.vendedor].v++;});
  var vl=Object.values(vk).sort(function(a,b){return b.v-a.v;});
  var vh='';if(vl.length){vh='<div style="margin-top:20px"><div class="section-title">Vendedores</div><table class="rank-table"><tr><th>Vendedor</th><th>Solicitudes</th><th>💰 Ventas</th></tr>';vl.forEach(function(v){vh+='<tr><td style="font-weight:600">'+esc(v.n)+'</td><td>'+v.tot+'</td><td style="color:var(--green);font-weight:700">'+v.v+'</td></tr>';});vh+='</table></div>';}
  // Razones no venta
  var razones={};s.forEach(function(x){if(x.estado==='No Vendido'&&x.razonNoVenta){if(!razones[x.razonNoVenta])razones[x.razonNoVenta]=0;razones[x.razonNoVenta]++;}});
  var rl=Object.entries(razones).sort(function(a,b){return b[1]-a[1];});
  var rh='';if(rl.length){rh='<div style="margin-top:20px"><div class="section-title">Razones de No Venta</div><table class="rank-table"><tr><th>Razón</th><th>Cantidad</th></tr>';rl.forEach(function(r){rh+='<tr><td>'+esc(r[0])+'</td><td style="font-weight:700">'+r[1]+'</td></tr>';});rh+='</table></div>';}
  $('statsContainer').innerHTML='<div class="stat-grid"><div class="stat-card accent"><div class="stat-num">'+tot+'</div><div class="stat-label">Total</div></div><div class="stat-card orange"><div class="stat-num">'+pend+'</div><div class="stat-label">Pendientes</div></div><div class="stat-card blue"><div class="stat-num">'+busc+'</div><div class="stat-label">Buscando</div></div><div class="stat-card green"><div class="stat-num">'+enc+'</div><div class="stat-label">Encontrados</div></div><div class="stat-card red"><div class="stat-num">'+noE+'</div><div class="stat-label">No Encontrados</div></div><div class="stat-card green"><div class="stat-num">'+tasaEnc+'%</div><div class="stat-label">Tasa Búsqueda</div></div><div class="stat-card green"><div class="stat-num">'+vend+'</div><div class="stat-label">💰 Vendidos</div></div><div class="stat-card purple"><div class="stat-num">'+noV+'</div><div class="stat-label">No Vendidos</div></div><div class="stat-card green"><div class="stat-num">'+tasaVenta+'%</div><div class="stat-label">Tasa Venta</div></div></div>'+rk+vh+rh;
}

function card(s,ctx){
  var uC=(s.urgencia||'normal').toLowerCase().replace('í','i'),eC=(s.estado||'Pendiente').toLowerCase().replace(' ','-').replace('á','a');
  var arch=s.archivos||[],archB=s.archivosBuscador||[];
  var att='';if(arch.length)att+='<div class="sol-attachments"><button class="btn-view" onclick="verDet(\''+s.id+'\')">📷 '+arch.length+' foto'+(arch.length>1?'s':'')+'</button></div>';if(archB.length)att+='<div class="sol-attachments"><button class="btn-view" style="background:var(--green-bg);color:var(--green)" onclick="verDet(\''+s.id+'\')">📸 Evidencia ('+archB.length+')</button></div>';
  var ac='',mio=s.vendedor===ST.name;
  if(ctx==='buscador'&&s.estado==='Pendiente')ac='<div class="sol-actions"><button class="btn btn-primary btn-sm" onclick="aceptar(\''+s.id+'\')">✋ Aceptar</button><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  else if(ctx==='buscador-activa')ac='<div class="sol-actions"><button class="btn btn-success btn-sm" onclick="reportar(\''+s.id+'\',\'Encontrado\')">✅ Encontrado</button><button class="btn btn-danger btn-sm" onclick="reportar(\''+s.id+'\',\'No Encontrado\')">❌ No</button></div>';
  else if(ctx==='admin')ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button>'+(s.estado==='Buscando'?'<button class="btn btn-sm" style="background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange)" onclick="desasignar(\''+s.id+'\')">↩</button>':'')+'<button class="btn-ghost" onclick="archivar(\''+s.id+'\')">🗑</button></div>';
  else if((ctx==='vendedor'||ctx==='vendedor-todas')&&mio&&s.estado==='Encontrado')ac='<div class="sol-actions"><button class="btn btn-success btn-sm" onclick="marcarVenta(\''+s.id+'\',true)">💰 Vendido</button><button class="btn btn-sm" style="background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple)" onclick="marcarVenta(\''+s.id+'\',false)">✗ No Vendido</button><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  else if((ctx==='vendedor'||ctx==='vendedor-todas')&&mio)ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button><button class="btn-ghost" onclick="archivar(\''+s.id+'\')">🗑</button></div>';
  else ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  return '<div class="sol-card"><div class="sol-card-header"><div><div class="sol-id">'+s.id+'</div><div class="sol-pieza">'+esc(s.pieza)+'</div><div class="sol-vehiculo">'+esc(s.marca)+' '+esc(s.modelo)+' '+(s.anio||'')+'</div></div><div style="text-align:right"><div class="sol-time">'+ago(s.fecha)+'</div><span class="tag tag-'+eC+'" style="margin-top:4px">'+(s.estado||'Pendiente')+'</span></div></div><div class="sol-meta"><span class="tag tag-'+uC+'">'+(s.urgencia||'Normal')+'</span>'+(s.cliente?'<span class="sol-meta-item">👤 '+esc(s.cliente)+'</span>':'')+'<span class="sol-meta-item">🏷️ '+esc(s.vendedor)+'</span></div>'+att+(s.notas?'<div class="sol-notas">"'+trunc(s.notas,80)+'"</div>':'')+(s.buscador?'<div style="font-size:0.8rem;color:var(--blue);margin-top:4px">🔍 '+esc(s.buscador)+'</div>':'')+(s.notasBuscador?'<div class="sol-notas" style="color:var(--blue)">💬 '+esc(s.notasBuscador)+'</div>':'')+(s.razonNoVenta?'<div class="sol-notas" style="color:var(--purple)">Razón: '+esc(s.razonNoVenta)+'</div>':'')+(s.fechaResultado?'<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">'+fDate(s.fechaResultado)+'</div>':'')+ac+'</div>';
}

function aceptar(id){var a=ST.sols.filter(function(s){return s.buscador===ST.name&&s.estado==='Buscando';});if(a.length>=3){toast('Límite 3 activas','error');return;}api({accion:'aceptar',id:id,buscador:ST.name}).then(function(r){if(r&&r.ok){toast('✓ Aceptada');loadD();buscadorTab('mias');}else toast('Error','error');});}
function archivar(id){api({accion:'archivar',id:id}).then(function(){toast('✓ Archivada');loadD();});}
function desasignar(id){api({accion:'desasignar',id:id}).then(function(){toast('✓ Desasignada');loadD();});}

function marcarVenta(id,vendido){
  if(vendido){api({accion:'venta',id:id,estado:'Vendido',razonNoVenta:''}).then(function(){toast('🎉 ¡Felicidades por la venta!');loadD();});}
  else{openModal('¿Por qué no se vendió?','<div class="form-group"><label>Razón:</label><select id="selRazon" style="width:100%"><option value="">Seleccionar...</option>'+RAZONES_NO_VENTA.map(function(r){return '<option value="'+r+'">'+r+'</option>';}).join('')+'</select></div><button class="btn btn-primary" onclick="confirmarNoVenta(\''+id+'\')">Confirmar</button>');}
}
function confirmarNoVenta(id){var r=($('selRazon')||{}).value;if(!r){toast('Selecciona razón','error');return;}api({accion:'venta',id:id,estado:'No Vendido',razonNoVenta:r}).then(function(){toast('✓ Registrado');closeModal();loadD();});}

var buscF=[];
function reportar(id,res){buscF=[];var s=ST.sols.find(function(x){return x.id===id;});var eE=res==='Encontrado';openModal('Reportar','<div style="text-align:center;margin-bottom:16px"><div style="font-size:2rem">'+(eE?'✅':'❌')+'</div><div style="font-size:1.1rem;font-weight:700;margin-top:8px">'+(eE?'Encontrada':'No Encontrada')+'</div>'+(s?'<div style="color:var(--text-dim);font-size:0.9rem;margin-top:4px">'+esc(s.pieza)+' — '+esc(s.marca)+' '+esc(s.modelo)+'</div>':'')+'</div>'+(eE?'<div class="form-group"><label>📸 Fotos</label><button type="button" class="file-upload-area" onclick="$(\'bfIn\').click()">📷 Foto/video</button><input type="file" id="bfIn" accept="image/*,video/*" multiple onchange="hBF(this)" style="display:none"><div class="file-previews" id="bfP"></div></div>':'')+'<div class="form-group"><label>'+(eE?'Ubicación':'Razón')+'</label><textarea id="mNotas" placeholder="'+(eE?'Pasillo, rack...':'No hay...')+'"></textarea></div><button class="btn '+(eE?'btn-success':'btn-danger')+'" id="btnConf" onclick="confRes(\''+id+"','"+res+"')\">Confirmar</button>");}
function hBF(inp){Array.from(inp.files).forEach(function(f){if(f.size>25e6)return;var isI=f.type.startsWith('image/');if(!isI&&!f.type.startsWith('video/'))return;if(isI)compImg(f).then(function(r){buscF.push({file:r.blob,prev:r.du,type:'image',name:f.name,mime:r.blob.type});rBP();});else{buscF.push({file:f,prev:URL.createObjectURL(f),type:'video',name:f.name,mime:f.type});rBP();}});inp.value='';}
function rBP(){var el=$('bfP');if(!el)return;el.innerHTML=buscF.map(function(f,i){return '<div class="file-preview-item">'+(f.type==='image'?'<img src="'+f.prev+'">':'<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.4rem">▶</div>')+'<button class="remove-file" onclick="buscF.splice('+i+',1);rBP()">✕</button></div>';}).join('');}
function confRes(id,res){var btn=$('btnConf');if(btn){btn.disabled=true;btn.textContent='⏳...';}var n=($('mNotas')||{}).value||'';n=n.trim();var est=res==='Encontrado'?'Encontrado':'No Encontrado';var chain=Promise.resolve([]);if(buscF.length&&res==='Encontrado'){var lk=[];var p=Promise.resolve();buscF.forEach(function(f){p=p.then(function(){return upFile(id+'_ev',f).then(function(l){if(l)lk.push(l);});});});chain=p.then(function(){return lk;});}chain.then(function(ab){return api({accion:'resultado',id:id,estado:est,notasBuscador:n,archivosBuscador:JSON.stringify(ab),fechaResultado:new Date().toISOString()});}).then(function(){buscF=[];toast('✓ Reportado');closeModal();loadD();});}

function driveThumb(u,sz){if(!u)return u;var m=u.match(/[?&]id=([^&]+)/);return m?'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w'+(sz||600):u;}
function driveOpen(u){if(!u)return u;var m=u.match(/[?&]id=([^&]+)/);return m?'https://drive.google.com/file/d/'+m[1]+'/view':u;}
function verDet(id){var s=ST.sols.find(function(x){return x.id===id;});if(!s)return;var uC=(s.urgencia||'normal').toLowerCase().replace('í','i'),eC=(s.estado||'Pendiente').toLowerCase().replace(' ','-').replace('á','a');var h='<div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" style="font-family:monospace;color:var(--accent)">'+s.id+'</span></div><div class="detail-row"><span class="detail-label">Pieza</span><span class="detail-value" style="font-weight:700">'+esc(s.pieza)+'</span></div><div class="detail-row"><span class="detail-label">Vehículo</span><span class="detail-value">'+esc(s.marca)+' '+esc(s.modelo)+' '+(s.anio||'')+'</span></div><div class="detail-row"><span class="detail-label">Cliente</span><span class="detail-value">'+esc(s.cliente||'—')+'</span></div><div class="detail-row"><span class="detail-label">Vendedor</span><span class="detail-value">'+esc(s.vendedor)+'</span></div><div class="detail-row"><span class="detail-label">Estado</span><span class="tag tag-'+eC+'">'+s.estado+'</span></div><div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">'+fDate(s.fecha)+'</span></div>';if(s.buscador)h+='<div class="detail-row"><span class="detail-label">Buscador</span><span class="detail-value" style="color:var(--blue)">'+esc(s.buscador)+'</span></div>';if(s.fechaResultado)h+='<div class="detail-row"><span class="detail-label">Resuelto</span><span class="detail-value">'+fDate(s.fechaResultado)+'</span></div>';if(s.notas)h+='<div class="detail-row"><span class="detail-label">Notas</span><span class="detail-value">'+esc(s.notas)+'</span></div>';if(s.notasBuscador)h+='<div class="detail-row"><span class="detail-label">Buscador</span><span class="detail-value" style="color:var(--blue)">'+esc(s.notasBuscador)+'</span></div>';if(s.razonNoVenta)h+='<div class="detail-row"><span class="detail-label">No vendido</span><span class="detail-value" style="color:var(--purple)">'+esc(s.razonNoVenta)+'</span></div>';var arch=s.archivos||[];if(arch.length){h+='<div style="font-size:0.82rem;font-weight:600;color:var(--text-dim);margin-top:14px">📷 Referencia:</div><div class="modal-gallery">';arch.forEach(function(a){h+=a.type==='video'?'<video controls src="'+a.url+'"></video>':'<a href="'+driveOpen(a.url)+'" target="_blank"><img src="'+driveThumb(a.url,600)+'"></a>';});h+='</div>';}var ab=s.archivosBuscador||[];if(ab.length){h+='<div style="font-size:0.82rem;font-weight:600;color:var(--green);margin-top:14px">📸 Evidencia:</div><div class="modal-gallery">';ab.forEach(function(a){h+=a.type==='video'?'<video controls src="'+a.url+'"></video>':'<a href="'+driveOpen(a.url)+'" target="_blank"><img src="'+driveThumb(a.url,600)+'"></a>';});h+='</div>';}openModal(s.id,h);}

var selectedRole=null;
function selectRole(r){selectedRole=r;document.querySelectorAll('.role-card').forEach(function(c,i){var m=(i===0&&r==='vendedor')||(i===1&&r==='buscador')||(i===2&&r==='admin');c.style.borderColor=m?'var(--accent)':'var(--border)';c.style.background=m?'var(--accent-bg)':'var(--surface)';});$('nameWrap').classList.add('show');$('adminPinWrap').style.display=r==='admin'?'block':'none';var sel=$('inputName');sel.innerHTML='<option value="">Seleccionar...</option>';(NOM[r]||[]).forEach(function(n){sel.innerHTML+='<option value="'+n+'">'+n+'</option>';});}
function confirmLogin(){var n=$('inputName').value;if(!n){toast('Selecciona nombre','error');return;}if(selectedRole==='admin'&&$('inputPin').value.trim()!==PIN){toast('PIN incorrecto','error');return;}ST.role=selectedRole;ST.name=n;save();enterApp();}
function logout(){localStorage.removeItem(LS);location.reload();}
function enterApp(){$('screenRole').style.display='none';$('appHeader').style.display='flex';var ic={vendedor:'🏷️',buscador:'🔍',admin:'👑'};$('headerUser').textContent=(ic[ST.role]||'')+' '+ST.name;$({vendedor:'viewVendedor',buscador:'viewBuscador',admin:'viewAdmin'}[ST.role]).style.display='block';initM();loadD();}
function vendedorTab(t){var m={nueva:'tabNueva',mis:'tabMis',todas:'tabTodas'};Object.values(m).forEach(function(id){$(id).style.display='none';});$(m[t]).style.display='block';document.querySelectorAll('#viewVendedor .tab-bar button').forEach(function(b,i){b.classList.toggle('active',(t==='nueva'&&i===0)||(t==='mis'&&i===1)||(t==='todas'&&i===2));});if(t==='mis')rMis();if(t==='todas')rTodas();}
function buscadorTab(t){var m={pendientes:'tabPendientes',mias:'tabMias',historial:'tabHistorial'};Object.values(m).forEach(function(id){$(id).style.display='none';});$(m[t]).style.display='block';document.querySelectorAll('#viewBuscador .tab-bar button').forEach(function(b,i){b.classList.toggle('active',(t==='pendientes'&&i===0)||(t==='mias'&&i===1)||(t==='historial'&&i===2));});}
function adminTab(t){var m={panel:'tabPanel',ordenes:'tabOrdenes'};Object.values(m).forEach(function(id){$(id).style.display='none';});$(m[t]).style.display='block';document.querySelectorAll('#viewAdmin .tab-bar button').forEach(function(b,i){b.classList.toggle('active',(t==='panel'&&i===0)||(t==='ordenes'&&i===1));});if(t==='panel')rStats();}
var urg='Normal';function setUrgency(el){urg=el.dataset.val;document.querySelectorAll('.urgency-pill').forEach(function(p){p.classList.remove('selected','normal','urgente','critico');});el.classList.add('selected',urg.toLowerCase().replace('í','i'));}
function openModal(t,b){$('modalTitle').textContent=t;$('modalBody').innerHTML=b;$('modal').classList.add('show');}
function closeModal(){$('modal').classList.remove('show');}
$('modal').addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay'))closeModal();});
function toast(m,t){var el=$('toast');el.textContent=m;el.className='toast'+(t==='error'?' error':'');el.style.display='block';setTimeout(function(){el.style.display='none';},3000);}
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function trunc(s,m){return s.length>m?s.slice(0,m)+'…':s;}
function ago(d){if(!d)return '';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'ahora';if(s<3600)return Math.floor(s/60)+'min';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function fDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function emp(e,m){return '<div class="empty-state"><div class="emoji">'+e+'</div><div class="msg">'+m+'</div></div>';}

// Notif
var aC=null;function beep(){try{if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();[0,0.18].forEach(function(d){var o=aC.createOscillator(),g=aC.createGain();o.connect(g);g.connect(aC.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,aC.currentTime+d);g.gain.exponentialRampToValueAtTime(0.01,aC.currentTime+d+0.15);o.start(aC.currentTime+d);o.stop(aC.currentTime+d+0.15);});}catch(e){}}
var lH='',nOn=false;
function sRef(){if(!ST.role)return;var oP=ST.sols.filter(function(s){return s.estado==='Pendiente';}).length,oR=ST.sols.filter(function(s){return s.estado==='Encontrado'||s.estado==='No Encontrado'||s.estado==='Vendido';}).length;loadD();var nH=ST.sols.map(function(x){return x.id+'|'+x.estado;}).join(',');if(lH&&nH!==lH&&nOn){var nP=ST.sols.filter(function(s){return s.estado==='Pendiente';}).length;var nR=ST.sols.filter(function(s){return s.estado==='Encontrado'||s.estado==='No Encontrado'||s.estado==='Vendido';}).length;if(ST.role==='buscador'&&nP>oP){beep();toast('🔔 Nueva solicitud');}else if(nR>oR){beep();toast('🔔 Actualización');}}lH=nH;}
document.addEventListener('click',function i(){nOn=true;try{if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();aC.resume();}catch(e){}document.removeEventListener('click',i);},{once:true});
document.addEventListener('click',function(e){var t=e.target;var rc=t.closest('.role-card');if(rc&&rc.dataset.role){selectRole(rc.dataset.role);return;}var up=t.closest('.urgency-pill');if(up){setUrgency(up);return;}if(t.closest('#fileUploadBtn')){$('fileInput').click();return;}if(t.closest('#logoutBtn')){logout();return;}});
setInterval(sRef,10000);
if(load())enterApp();
</script>
