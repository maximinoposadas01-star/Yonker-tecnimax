<script>
var PIN='4005',GU='https://script.google.com/macros/s/AKfycbzLTHNWU4jMlScsM9FjErKTPwJ4cZ9ft38tYBMczX5Uj4IYYRZXwbeEPcZTUln9xgtN/exec';
var VH={Honda:['CR-V','Civic','HR-V','Fit','Pilot','Accord'],Toyota:['Corolla','Tacoma','RAV4','Matrix','Yaris','4Runner'],Nissan:['Frontier','Pathfinder','Rogue','Sentra'],Hyundai:['Palisade','Santa Fe','Tucson','Elantra','Sonata','Accent'],Kia:['Sorento','Sportage','Forte','Soul'],Chevrolet:['Spark','Cruze','Equinox','Silverado'],Jeep:['Wrangler','Patriot','Cherokee','Grand Cherokee'],Ford:['Bronco','F-150','Escape','Focus','Expedition','Explorer'],Otro:['(en notas)']};
var NM={vendedor:['ADONIS','HAROLD','BULNES','OSCAR','NOE','LUIS'],buscador:['AXEL','ISAAC','PAISA','ANTONI','ROGER','CRISTHIAN'],admin:['ADONIS']};
var RNV=['DIFERENTE','PRECIO','DAÑADO','NO LE GUSTO','OTRO'];
var ST={role:null,name:'',sols:[],url:GU},LS='tmx11';
function save(){localStorage.setItem(LS,JSON.stringify({r:ST.role,n:ST.name,u:ST.url}));}
function load(){try{var s=JSON.parse(localStorage.getItem(LS));if(s&&s.r&&s.n){ST.role=s.r;ST.name=s.n;ST.url=s.u||GU;return true;}}catch(e){}return false;}
function $(id){return document.getElementById(id);}
function initM(){var s=$('fMarca');if(!s)return;s.innerHTML='<option value="">Marca...</option>';Object.keys(VH).forEach(function(m){s.innerHTML+='<option value="'+m+'">'+m+'</option>';});}
function updateModelos(){var m=$('fMarca').value,s=$('fModelo');s.innerHTML='<option value="">Modelo...</option>';if(m&&VH[m])VH[m].forEach(function(v){s.innerHTML+='<option value="'+v+'">'+v+'</option>';});}

// FILES
var pF=[];
function handleFiles(inp){Array.from(inp.files).forEach(function(f){if(f.size>25e6)return;var i=f.type.startsWith('image/'),v=f.type.startsWith('video/');if(!i&&!v)return;if(i)cImg(f).then(function(r){pF.push({file:r.b,prev:r.d,type:'image',name:f.name,mime:r.b.type});rPv();});else{pF.push({file:f,prev:URL.createObjectURL(f),type:'video',name:f.name,mime:f.type});rPv();}});inp.value='';}
function cImg(f){return new Promise(function(res){var img=new Image();img.onload=function(){var w=img.width,h=img.height,mx=1024;if(w>mx||h>mx){var r=Math.min(mx/w,mx/h);w=Math.round(w*r);h=Math.round(h*r);}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(function(b){res({b:b,d:c.toDataURL('image/jpeg',0.4)});},'image/jpeg',0.65);};img.src=URL.createObjectURL(f);});}
function rPv(){$('filePreviews').innerHTML=pF.map(function(f,i){return '<div class="file-preview-item">'+(f.type==='image'?'<img src="'+f.prev+'">':'<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.3rem">▶</div>')+'<button class="remove-file" onclick="pF.splice('+i+',1);rPv()">✕</button></div>';}).join('');}
function toB64(f){return new Promise(function(r,j){var rd=new FileReader();rd.onload=function(){r(rd.result.split(',')[1]);};rd.onerror=j;rd.readAsDataURL(f);});}
function upF(sid,f){return toB64(f.file).then(function(b){return fetch(ST.url,{method:'POST',redirect:'follow',body:JSON.stringify({accion:'upload',solicitudId:sid.replace('_ev',''),fileName:f.name,mimeType:f.mime,base64:b})}).then(function(r){return r.json().catch(function(){return r.text().then(function(t){var m=t.match(/href="([^"]+)"/);return m?fetch(m[1]).then(function(r2){return r2.json();}):null;});});}).then(function(d){if(d&&d.ok&&d.fileUrl)return{url:d.fileUrl,type:f.type,name:f.name};return upC(sid,f,b);}).catch(function(){return upC(sid,f,b);});});}
function upC(sid,f,b){var C=6000,ch=[];for(var i=0;i<b.length;i+=C)ch.push(b.slice(i,i+C));return api({accion:'uploadInit',solicitudId:sid,fileName:f.name,mimeType:f.mime,totalChunks:ch.length}).then(function(ir){if(!ir||!ir.ok)return null;var p=Promise.resolve();ch.forEach(function(c,i){p=p.then(function(){return api({accion:'uploadChunk',uploadId:ir.uploadId,chunkIndex:i,data:c});});});return p.then(function(){return api({accion:'uploadFinalize',uploadId:ir.uploadId});}).then(function(fr){return fr&&fr.ok&&fr.fileUrl?{url:fr.fileUrl,type:f.type,name:f.name}:null;});});}
function api(p){return new Promise(function(res){var cb='_c'+Date.now()+Math.random().toString(36).slice(2,6);window[cb]=function(d){delete window[cb];if(sc&&sc.parentNode)sc.parentNode.removeChild(sc);res(d);};var sc=document.createElement('script');p.callback=cb;sc.src=ST.url+'?'+new URLSearchParams(p);sc.onerror=function(){delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc);res(null);};document.head.appendChild(sc);setTimeout(function(){if(window[cb]){delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc);res(null);}},12000);});}

// CREAR
var _enviando=false;
function crearSolicitud(){if(_enviando)return;var pieza=$('fPieza').value.trim(),marca=$('fMarca').value,modelo=$('fModelo').value,anio=$('fAnio').value.trim(),cliente=$('fCliente').value.trim(),notas=$('fNotas').value.trim();if(!pieza||!marca||!modelo){toast('Campos obligatorios','error');return;}var btn=$('btnEnviar');btn.disabled=true;btn.textContent='⏳...';_enviando=true;var id='SOL-'+Date.now().toString(36).toUpperCase();api({accion:'crear',id:id,pieza:pieza,marca:marca,modelo:modelo,anio:anio,cliente:cliente,notas:notas,archivos:'[]',vendedor:ST.name,fecha:new Date().toISOString()}).then(function(r){if(!r||!r.ok){toast('Error','error');btn.disabled=false;btn.textContent='📤 Enviar';_enviando=false;return;}if(!pF.length)return dn();var pg=$('uploadProgress'),fl=$('progressFill'),tx=$('progressText');pg.classList.add('show');var ch=Promise.resolve();pF.forEach(function(f,i){ch=ch.then(function(){tx.textContent=(i+1)+'/'+pF.length;fl.style.width=((i+1)/pF.length*100)+'%';return upF(id,f);});});ch.then(function(){tx.textContent='✓';setTimeout(function(){pg.classList.remove('show');},1e3);dn();});function dn(){btn.disabled=false;btn.textContent='📤 Enviar';_enviando=false;toast('✓ '+id);clr();loadD();}});}
function clr(){['fPieza','fAnio','fCliente','fNotas'].forEach(function(id){$(id).value='';});$('fMarca').selectedIndex=0;updateModelos();pF=[];rPv();}

// DATA
function loadD(){api({accion:'listar'}).then(function(r){if(r&&r.data)ST.sols=r.data.map(function(s){['archivos','archivosBuscador'].forEach(function(k){if(typeof s[k]==='string'&&s[k]){try{s[k]=JSON.parse(s[k]);}catch(e){s[k]=[];}}if(!Array.isArray(s[k]))s[k]=[];});s.estadoPrevio=s.estadoPrevio||'';s.buscadoresPrevios=s.buscadoresPrevios||'';return s;});renderAll();});}

function rTodas(){var l=ST.sols.filter(function(s){return s.estado!=='Archivado';});$('badgeTodas').textContent=l.length;$('listTodas').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'vendedor-todas');}).join(''):emp('📋','Vacío');}
function rPn(){var l=ST.sols.filter(function(s){return s.estado==='Pendiente';});$('badgePend').textContent=l.length;$('listPend').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'buscador');}).join(''):emp('🎉','Sin pendientes');}
function rBM(){var l=ST.sols.filter(function(s){return s.buscador===ST.name&&s.estado==='Buscando';});$('badgeMias').textContent=l.length;$('listBMias').innerHTML=l.length?l.map(function(s){return card(s,'buscador-activa');}).join(''):emp('🔍','Sin activas');}

function rAProc(){var l=ST.sols.filter(function(s){return s.estado==='Pendiente'||s.estado==='Buscando'||s.estado==='Encontrado';});$('badgeProc').textContent=l.length;$('lProc').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'admin');}).join(''):emp('✓','Vacío');}
function rAVd(){var l=ST.sols.filter(function(s){return s.estado==='Vendido'||(s.estado==='Archivado'&&s.estadoPrevio==='Vendido');});$('badgeVd').textContent=l.length;$('lVend').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'admin-arch');}).join(''):emp('💰','Sin vendidas');}
function rANV(){var l=ST.sols.filter(function(s){return s.estado==='No Vendido'||(s.estado==='Archivado'&&s.estadoPrevio==='No Vendido');});$('badgeNV').textContent=l.length;$('lNV').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'admin-arch');}).join(''):emp('✗','Sin no vendidas');}
function rANE(){var l=ST.sols.filter(function(s){return s.estado==='No Encontrado'||(s.estado==='Archivado'&&s.estadoPrevio==='No Encontrado');});$('badgeNE').textContent=l.length;$('lNE').innerHTML=l.length?l.sort(byF).map(function(s){return card(s,'admin-arch');}).join(''):emp('❌','Sin no encontradas');}
function byF(a,b){return new Date(b.fecha)-new Date(a.fecha);}

function rStats(){api({accion:'stats'}).then(function(r){
  var h=(r&&r.historial)||[];var s=ST.sols,pend=0,busc=0,enc=0,noE=0,vend=0,noV=0;
  h.forEach(function(x){if(x.estado==='Encontrado')enc++;if(x.estado==='No Encontrado')noE++;if(x.resultadoVenta==='Vendido')vend++;if(x.resultadoVenta==='No Vendido')noV++;});
  s.forEach(function(x){if(x.estado==='Pendiente')pend++;if(x.estado==='Buscando')busc++;});
  var tB=enc+noE,tE=tB>0?Math.round(enc/tB*100):0,tV=vend+noV>0?Math.round(vend/(vend+noV)*100):0;
  var bk={};h.forEach(function(x){if(!x.buscador)return;if(NM.buscador.indexOf(x.buscador)<0)return;if(!bk[x.buscador])bk[x.buscador]={n:x.buscador,e:0,ne:0,t:[]};var b=bk[x.buscador];if(x.estado==='Encontrado'){b.e++;if(x.fechaSolicitud&&x.fechaResultado){var m=Math.round((new Date(x.fechaResultado)-new Date(x.fechaSolicitud))/6e4);if(m>0&&m<1440)b.t.push(m);}}if(x.estado==='No Encontrado')b.ne++;});
  var bl=Object.values(bk).sort(function(a,b){var ta=a.e+a.ne>0?a.e/(a.e+a.ne):0;var tb=b.e+b.ne>0?b.e/(b.e+b.ne):0;return tb-ta;});
  var rk='';if(bl.length){rk='<div style="margin-top:16px"><div class="section-title">Buscadores</div><table class="rank-table"><tr><th>Nombre</th><th>✅</th><th>❌</th><th>%</th><th>⏱</th></tr>';bl.forEach(function(b){var av=b.t.length?Math.round(b.t.reduce(function(a,c){return a+c;},0)/b.t.length):'-';var tx=b.e+b.ne>0?Math.round(b.e/(b.e+b.ne)*100):0;rk+='<tr><td style="font-weight:600">'+esc(b.n)+'</td><td style="color:var(--green)">'+b.e+'</td><td style="color:var(--red)">'+b.ne+'</td><td style="color:var(--accent)">'+tx+'%</td><td>'+(av==='-'?'-':av+'m')+'</td></tr>';});rk+='</table></div>';}
  var vk={};h.forEach(function(x){if(!x.vendedor)return;if(NM.vendedor.indexOf(x.vendedor)<0)return;if(!vk[x.vendedor])vk[x.vendedor]={n:x.vendedor,t:0,v:0};vk[x.vendedor].t++;if(x.resultadoVenta==='Vendido')vk[x.vendedor].v++;});
  var vl=Object.values(vk).sort(function(a,b){return b.v-a.v;});
  var vh='';if(vl.length){vh='<div style="margin-top:16px"><div class="section-title">Vendedores</div><table class="rank-table"><tr><th>Nombre</th><th>Sol</th><th>💰</th></tr>';vl.forEach(function(v){vh+='<tr><td style="font-weight:600">'+esc(v.n)+'</td><td>'+v.t+'</td><td style="color:var(--green);font-weight:700">'+v.v+'</td></tr>';});vh+='</table></div>';}
  var rz={};h.forEach(function(x){if(x.resultadoVenta==='No Vendido'&&x.razonNoVenta){if(!rz[x.razonNoVenta])rz[x.razonNoVenta]=0;rz[x.razonNoVenta]++;}});var rl=Object.entries(rz).sort(function(a,b){return b[1]-a[1];});
  var rh='';if(rl.length){rh='<div style="margin-top:16px"><div class="section-title">Razones No Venta</div><table class="rank-table"><tr><th>Razón</th><th>#</th></tr>';rl.forEach(function(r){rh+='<tr><td>'+esc(r[0])+'</td><td style="font-weight:700">'+r[1]+'</td></tr>';});rh+='</table></div>';}
  $('statsC').innerHTML='<div class="stat-grid"><div class="stat-card orange"><div class="stat-num">'+pend+'</div><div class="stat-label">Pendientes</div></div><div class="stat-card blue"><div class="stat-num">'+busc+'</div><div class="stat-label">Buscando</div></div><div class="stat-card green"><div class="stat-num">'+enc+'</div><div class="stat-label">Encontrados</div></div><div class="stat-card red"><div class="stat-num">'+noE+'</div><div class="stat-label">No Enc.</div></div><div class="stat-card green"><div class="stat-num">'+tE+'%</div><div class="stat-label">Tasa Búsq.</div></div><div class="stat-card green"><div class="stat-num">'+vend+'</div><div class="stat-label">💰 Vendidos</div></div><div class="stat-card purple"><div class="stat-num">'+noV+'</div><div class="stat-label">No Vend.</div></div><div class="stat-card green"><div class="stat-num">'+tV+'%</div><div class="stat-label">Tasa Venta</div></div></div>'+rk+vh+rh;
});}

// NOTAS ACUMULATIVAS POR BUSCADOR
function parseNotasBusc(nb){if(!nb)return [];return nb.split(' | ').map(function(x){var i=x.indexOf(': ');if(i<0)return {nombre:'',nota:x};return {nombre:x.slice(0,i),nota:x.slice(i+2)};}).filter(function(x){return x.nota;});}
function renderNotasCard(nb){var ns=parseNotasBusc(nb);if(!ns.length)return '';return ns.map(function(n){return '<div class="sol-notas" style="color:var(--blue)">🔍 <b>'+esc(n.nombre)+'</b>: '+esc(trunc(n.nota,60))+'</div>';}).join('');}
function renderNotasDet(nb){var ns=parseNotasBusc(nb);if(!ns.length)return '';return ns.map(function(n){return '<div class="detail-row"><span class="detail-label" style="color:var(--blue)">🔍 '+esc(n.nombre)+'</span><span class="detail-value" style="color:var(--blue)">'+esc(n.nota)+'</span></div>';}).join('');}

// CARD
function card(s,ctx){
  var eC=(s.estado||'Pendiente').toLowerCase().replace(' ','-').replace('á','a');
  var arch=s.archivos||[],archB=s.archivosBuscador||[];
  var att='';if(arch.length)att+='<div class="sol-attachments"><button class="btn-view" onclick="verDet(\''+s.id+'\')">📷 '+arch.length+'</button></div>';if(archB.length)att+='<div class="sol-attachments"><button class="btn-view" style="background:var(--green-bg);color:var(--green)" onclick="verDet(\''+s.id+'\')">📸 '+archB.length+'</button></div>';
  var rebusq=s.buscadoresPrevios?s.buscadoresPrevios.split(',').filter(function(x){return x;}).length:0;
  var rebTag=rebusq>0&&s.estado==='Pendiente'?' <span class="tag" style="background:var(--orange-bg);color:var(--orange);font-size:0.6rem">🔄 '+rebusq+'/2</span>':'';
  var isAdm=s.vendedor==='ADONIS'&&ST.role!=='admin';
  var ac='',mio=s.vendedor===ST.name,isV=ctx==='vendedor'||ctx==='vendedor-todas';
  if(ctx==='buscador'&&s.estado==='Pendiente')ac='<div class="sol-actions"><button class="btn btn-primary btn-sm" onclick="aceptar(\''+s.id+'\')">✋ Aceptar</button><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  else if(ctx==='buscador-activa')ac='<div class="sol-actions"><button class="btn btn-success btn-sm" onclick="reportar(\''+s.id+'\',\'Encontrado\')">✅ Encontrado</button><button class="btn btn-danger btn-sm" onclick="reportar(\''+s.id+'\',\'No Encontrado\')">❌ No hay</button></div>';
  else if(ctx==='admin')ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button>'+(s.estado==='Buscando'?'<button class="btn btn-sm" style="background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange)" onclick="desasignar(\''+s.id+'\')">↩</button>':'')+'<button class="btn-ghost" onclick="archivar(\''+s.id+'\')">🗑</button></div>';
  else if(ctx==='admin-arch')ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button><button class="btn-ghost" style="color:var(--red)" onclick="admBorrar(\''+s.id+'\')">🗑 Eliminar</button></div>';
  else if(isV&&s.estado==='Encontrado'&&(mio||ST.role==='admin'))ac='<div class="sol-actions"><button class="btn btn-success btn-sm" onclick="mVenta(\''+s.id+'\',1)">💰 Vendido</button><button class="btn btn-sm" style="background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple)" onclick="mVenta(\''+s.id+'\',0)">✗ No Vendido</button><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  else if(isV&&s.estado==='Encontrado')ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  else if(isV&&mio&&(s.estado==='Pendiente'||s.estado==='Buscando'))ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button><button class="btn-ghost" onclick="archivar(\''+s.id+'\')">🗑</button></div>';
  else ac='<div class="sol-actions"><button class="btn btn-secondary btn-sm" onclick="verDet(\''+s.id+'\')">👁</button></div>';
  var admClass=isAdm?' admin-order':'';
  return '<div class="sol-card'+admClass+'"><div class="sol-card-header"><div><div class="sol-id">'+s.id+'</div><div class="sol-pieza">'+esc(s.pieza)+'</div><div class="sol-vehiculo">'+esc(s.marca)+' '+esc(s.modelo)+' '+(s.anio||'')+'</div></div><div style="text-align:right"><div class="sol-time">'+ago(s.fecha)+'</div><span class="tag tag-'+eC+'" style="margin-top:3px">'+(s.estado||'Pendiente')+'</span>'+rebTag+'</div></div><div class="sol-meta">'+(s.cliente?'<span class="sol-meta-item">👤 '+esc(s.cliente)+'</span>':'')+'<span class="sol-meta-item">🏷️ '+esc(s.vendedor)+'</span>'+(s.buscadoresPrevios?'<span class="sol-meta-item" style="color:var(--orange)">🔍 '+esc(s.buscadoresPrevios)+'</span>':'')+'</div>'+att+(s.notas?'<div class="sol-notas">"'+trunc(s.notas,70)+'"</div>':'')+(s.buscador&&s.estado==='Buscando'?'<div style="font-size:0.78rem;color:var(--blue);margin-top:3px">🔍 '+esc(s.buscador)+'</div>':'')+renderNotasCard(s.notasBuscador)+(s.razonNoVenta?'<div class="sol-notas" style="color:var(--purple)">'+esc(s.razonNoVenta)+'</div>':'')+(s.fechaResultado?'<div style="font-size:0.68rem;color:var(--text-muted);margin-top:3px">'+fD(s.fechaResultado)+'</div>':'')+ac+'</div>';
}

// ACTIONS
function aceptar(id){var a=ST.sols.filter(function(s){return s.buscador===ST.name&&s.estado==='Buscando';});if(a.length>=3){toast('Límite 3','error');return;}var sol=ST.sols.find(function(s){return s.id===id;});if(sol&&sol.buscadoresPrevios&&sol.buscadoresPrevios.indexOf(ST.name)>=0){toast('Ya buscaste esta orden','error');return;}api({accion:'aceptar',id:id,buscador:ST.name}).then(function(r){if(r&&r.ok){toast('✓');loadD();buscadorTab('mias');}else toast(r&&r.error||'Error','error');});}
function archivar(id){api({accion:'archivar',id:id}).then(function(){toast('✓');loadD();});}
function desasignar(id){api({accion:'desasignar',id:id}).then(function(){toast('✓');loadD();});}
function admBorrar(id){api({accion:'adminBorrar',id:id}).then(function(){toast('✓ Eliminada');loadD();});}
function mVenta(id,v){if(v){api({accion:'venta',id:id,estado:'Vendido',razonNoVenta:''}).then(function(){toast('🎉 ¡Venta!');loadD();});}else{openModal('Razón','<div class="form-group"><label>¿Por qué no se vendió?</label><select id="selR" style="width:100%"><option value="">Seleccionar...</option>'+RNV.map(function(r){return '<option value="'+r+'">'+r+'</option>';}).join('')+'</select></div><button class="btn btn-primary" onclick="cNV(\''+id+'\')">Confirmar</button>');}}
function cNV(id){var r=($('selR')||{}).value;if(!r){toast('Selecciona razón','error');return;}api({accion:'venta',id:id,estado:'No Vendido',razonNoVenta:r}).then(function(){toast('✓');closeModal();loadD();});}
function limpG(t){var l=ST.sols.filter(function(s){return s.estado==='Pendiente'||s.estado==='Buscando'||s.estado==='Encontrado';});if(!l.length){toast('Vacío');return;}openModal('⚠️','<div style="text-align:center;margin-bottom:14px"><p style="font-weight:700">¿Archivar '+l.length+' órdenes?</p></div><div style="display:flex;gap:8px"><button class="btn btn-secondary" onclick="closeModal()">No</button><button class="btn btn-danger" onclick="exLimp()">Sí</button></div>');}
function exLimp(){var l=ST.sols.filter(function(s){return s.estado==='Pendiente'||s.estado==='Buscando'||s.estado==='Encontrado';});closeModal();toast('⏳...');var c=Promise.resolve();l.forEach(function(s){c=c.then(function(){return api({accion:'archivar',id:s.id});});});c.then(function(){toast('✓');loadD();});}
function limpA(t){var f;if(t==='vend')f=function(s){return s.estado==='Vendido'||(s.estado==='Archivado'&&s.estadoPrevio==='Vendido');};else if(t==='nv')f=function(s){return s.estado==='No Vendido'||(s.estado==='Archivado'&&s.estadoPrevio==='No Vendido');};else f=function(s){return s.estado==='No Encontrado'||(s.estado==='Archivado'&&s.estadoPrevio==='No Encontrado');};var l=ST.sols.filter(f);if(!l.length){toast('Vacío');return;}openModal('⚠️','<div style="text-align:center;margin-bottom:14px"><p style="font-weight:700">¿Eliminar '+l.length+' definitivamente?</p><p style="font-size:0.8rem;color:var(--red)">Stats del historial se conservan</p></div><div style="display:flex;gap:8px"><button class="btn btn-secondary" onclick="closeModal()">No</button><button class="btn btn-danger" onclick="exBorr(\''+t+'\')">Sí</button></div>');}
function exBorr(t){var f;if(t==='vend')f=function(s){return s.estado==='Vendido'||(s.estado==='Archivado'&&s.estadoPrevio==='Vendido');};else if(t==='nv')f=function(s){return s.estado==='No Vendido'||(s.estado==='Archivado'&&s.estadoPrevio==='No Vendido');};else f=function(s){return s.estado==='No Encontrado'||(s.estado==='Archivado'&&s.estadoPrevio==='No Encontrado');};var l=ST.sols.filter(f);closeModal();toast('⏳...');var c=Promise.resolve();l.forEach(function(s){c=c.then(function(){return api({accion:'adminBorrar',id:s.id});});});c.then(function(){toast('✓');loadD();});}

// REPORTAR
var bF=[];
function reportar(id,res){bF=[];var s=ST.sols.find(function(x){return x.id===id;});var eE=res==='Encontrado';openModal(eE?'Encontrado':'No Encontrado','<div style="text-align:center;margin-bottom:14px"><div style="font-size:2rem">'+(eE?'✅':'❌')+'</div>'+(s?'<div style="color:var(--text-dim);font-size:0.85rem;margin-top:4px">'+esc(s.pieza)+' — '+esc(s.marca)+' '+esc(s.modelo)+'</div>':'')+'</div>'+(eE?'<div class="form-group"><label>📸 Fotos</label><button type="button" class="file-upload-area" onclick="$(\'bfI\').click()">📷 Foto</button><input type="file" id="bfI" accept="image/*,video/*" multiple onchange="hBF(this)" style="display:none"><div class="file-previews" id="bfP"></div></div>':'')+'<div class="form-group"><label>'+(eE?'Ubicación':'Observación')+'</label><textarea id="mN" placeholder="'+(eE?'Pasillo, rack...':'Detalles...')+'"></textarea></div><button class="btn '+(eE?'btn-success':'btn-danger')+'" id="btnC" onclick="cRes(\''+id+"','"+res+"')\">Confirmar</button>");}
function hBF(inp){Array.from(inp.files).forEach(function(f){if(f.size>25e6)return;var i=f.type.startsWith('image/');if(!i&&!f.type.startsWith('video/'))return;if(i)cImg(f).then(function(r){bF.push({file:r.b,prev:r.d,type:'image',name:f.name,mime:r.b.type});rBP();});else{bF.push({file:f,prev:URL.createObjectURL(f),type:'video',name:f.name,mime:f.type});rBP();}});inp.value='';}
function rBP(){var el=$('bfP');if(!el)return;el.innerHTML=bF.map(function(f,i){return '<div class="file-preview-item">'+(f.type==='image'?'<img src="'+f.prev+'">':'<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.2rem">▶</div>')+'<button class="remove-file" onclick="bF.splice('+i+',1);rBP()">✕</button></div>';}).join('');}
function cRes(id,res){var btn=$('btnC');if(btn){btn.disabled=true;btn.textContent='⏳...';}var n=($('mN')||{}).value||'';n=n.trim();var est=res==='Encontrado'?'Encontrado':'No Encontrado';var ch=Promise.resolve([]);if(bF.length&&res==='Encontrado'){var lk=[];var p=Promise.resolve();bF.forEach(function(f){p=p.then(function(){return upF(id+'_ev',f).then(function(l){if(l)lk.push(l);});});});ch=p.then(function(){return lk;});}ch.then(function(ab){return api({accion:'resultado',id:id,estado:est,notasBuscador:n,archivosBuscador:JSON.stringify(ab),fechaResultado:new Date().toISOString()});}).then(function(){bF=[];if(res==='No Encontrado'){var sol=ST.sols.find(function(x){return x.id===id;});var prev=sol&&sol.buscadoresPrevios?sol.buscadoresPrevios.split(',').filter(function(x){return x;}).length:0;if(prev<1)toast('🔄 Rebúsqueda — otro buscador la verá');else toast('❌ No Encontrado definitivo');}else toast('✓ Encontrado');closeModal();loadD();});}

// DETALLE
function dTh(u,sz){if(!u)return u;var m=u.match(/[?&]id=([^&]+)/);return m?'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w'+(sz||600):u;}
function dOp(u){if(!u)return u;var m=u.match(/[?&]id=([^&]+)/);return m?'https://drive.google.com/file/d/'+m[1]+'/view':u;}
function verDet(id){var s=ST.sols.find(function(x){return x.id===id;});if(!s)return;var eC=(s.estado||'Pendiente').toLowerCase().replace(' ','-').replace('á','a');
  var h='<div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" style="font-family:monospace;color:var(--accent)">'+s.id+'</span></div><div class="detail-row"><span class="detail-label">Pieza</span><span class="detail-value" style="font-weight:700">'+esc(s.pieza)+'</span></div><div class="detail-row"><span class="detail-label">Vehículo</span><span class="detail-value">'+esc(s.marca)+' '+esc(s.modelo)+' '+(s.anio||'')+'</span></div><div class="detail-row"><span class="detail-label">Cliente</span><span class="detail-value">'+esc(s.cliente||'—')+'</span></div><div class="detail-row"><span class="detail-label">Vendedor</span><span class="detail-value">'+esc(s.vendedor)+'</span></div><div class="detail-row"><span class="detail-label">Estado</span><span class="tag tag-'+eC+'">'+s.estado+'</span></div><div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">'+fD(s.fecha)+'</span></div>';
  // Mostrar TODOS los buscadores previos
  if(s.buscadoresPrevios){var bp=s.buscadoresPrevios.split(',').filter(function(x){return x;});if(bp.length)h+='<div class="detail-row"><span class="detail-label">Buscadores</span><span class="detail-value" style="color:var(--blue)">'+bp.map(function(b){return esc(b);}).join(', ')+'</span></div>';}
  if(s.buscador&&s.estado==='Buscando')h+='<div class="detail-row"><span class="detail-label">Buscando</span><span class="detail-value" style="color:var(--blue)">'+esc(s.buscador)+'</span></div>';
  if(s.fechaResultado)h+='<div class="detail-row"><span class="detail-label">Resuelto</span><span class="detail-value">'+fD(s.fechaResultado)+'</span></div>';
  if(s.notas)h+='<div class="detail-row"><span class="detail-label">Notas</span><span class="detail-value">'+esc(s.notas)+'</span></div>';
  if(s.notasBuscador)h+=renderNotasDet(s.notasBuscador);
  if(s.razonNoVenta)h+='<div class="detail-row"><span class="detail-label">No vendido</span><span class="detail-value" style="color:var(--purple)">'+esc(s.razonNoVenta)+'</span></div>';
  var ar=s.archivos||[];if(ar.length){h+='<div style="font-size:0.8rem;font-weight:600;color:var(--text-dim);margin-top:12px">📷 Referencia:</div><div class="modal-gallery">';ar.forEach(function(a){h+=a.type==='video'?'<video controls src="'+a.url+'"></video>':'<a href="'+dOp(a.url)+'" target="_blank"><img src="'+dTh(a.url)+'"></a>';});h+='</div>';}
  var ab=s.archivosBuscador||[];if(ab.length){h+='<div style="font-size:0.8rem;font-weight:600;color:var(--green);margin-top:12px">📸 Evidencia:</div><div class="modal-gallery">';ab.forEach(function(a){h+=a.type==='video'?'<video controls src="'+a.url+'"></video>':'<a href="'+dOp(a.url)+'" target="_blank"><img src="'+dTh(a.url)+'"></a>';});h+='</div>';}
  openModal(s.id,h);}

// LOGIN
var selR=null;
function selectRole(r){selR=r;document.querySelectorAll('.role-card').forEach(function(c,i){var m=(i===0&&r==='vendedor')||(i===1&&r==='buscador')||(i===2&&r==='admin');c.style.borderColor=m?'var(--accent)':'var(--border)';c.style.background=m?'var(--accent-bg)':'var(--surface)';});$('nameWrap').classList.add('show');$('adminPinWrap').style.display=r==='admin'?'block':'none';var sel=$('inputName');sel.innerHTML='<option value="">Seleccionar...</option>';(NM[r]||[]).forEach(function(n){sel.innerHTML+='<option value="'+n+'">'+n+'</option>';});}
function confirmLogin(){var n=$('inputName').value;if(!n){toast('Nombre','error');return;}if(selR==='admin'&&$('inputPin').value.trim()!==PIN){toast('PIN incorrecto','error');return;}ST.role=selR;ST.name=n;save();enterApp();}
function logout(){localStorage.removeItem(LS);location.reload();}
function enterApp(){$('screenRole').style.display='none';$('appHeader').style.display='flex';var ic={vendedor:'🏷️',buscador:'🔍',admin:'👑'};$('headerUser').textContent=(ic[ST.role]||'')+' '+ST.name;
  if(ST.role==='admin')$('viewAdmin').style.display='block';
  else if(ST.role==='vendedor')$('viewVendedor').style.display='block';
  else $('viewBuscador').style.display='block';
  initM();loadD();}
function vTab(t){var m={nueva:'tabNueva',mis:'tabMis',todas:'tabTodas'};Object.values(m).forEach(function(id){$(id).style.display='none';});$(m[t]).style.display='block';document.querySelectorAll('#vTabs button').forEach(function(b,i){b.classList.toggle('active',(t==='nueva'&&i===0)||(t==='mis'&&i===1)||(t==='todas'&&i===2));});if(t==='mis')rMis();if(t==='todas')rTodas();}
function buscadorTab(t){var m={pend:'tabPend',mias:'tabBMias',hist:'tabHist'};Object.values(m).forEach(function(id){$(id).style.display='none';});$(m[t]).style.display='block';document.querySelectorAll('#viewBuscador .tab-bar button').forEach(function(b,i){b.classList.toggle('active',(t==='pend'&&i===0)||(t==='mias'&&i===1)||(t==='hist'&&i===2));});}
function aTab(t){var m={panel:'aPanel',proc:'aProc',vend:'aVend',nv:'aNV',ne:'aNE'};Object.values(m).forEach(function(id){$(id).style.display='none';});$(m[t]).style.display='block';document.querySelectorAll('#viewAdmin .tab-bar button').forEach(function(b,i){b.classList.toggle('active',(t==='panel'&&i===0)||(t==='proc'&&i===1)||(t==='vend'&&i===2)||(t==='nv'&&i===3)||(t==='ne'&&i===4));});if(t==='panel')rStats();}
function openModal(t,b){$('modalTitle').textContent=t;$('modalBody').innerHTML=b;$('modal').classList.add('show');}
function closeModal(){$('modal').classList.remove('show');}
$('modal').addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay'))closeModal();});
function toast(m,t){var el=$('toast');el.textContent=m;el.className='toast'+(t==='error'?' error':'');el.style.display='block';setTimeout(function(){el.style.display='none';},3000);}
var _escDiv=document.createElement('div');function esc(s){if(!s)return '';_escDiv.textContent=s;return _escDiv.innerHTML;}
function trunc(s,m){return s.length>m?s.slice(0,m)+'…':s;}
function ago(d){if(!d)return '';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'ahora';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function fD(d){if(!d)return '—';return new Date(d).toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function emp(e,m){return '<div class="empty-state"><div class="emoji">'+e+'</div><div class="msg">'+m+'</div></div>';}

// NOTIF
var aC=null;function beep(){try{if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();[0,0.18].forEach(function(d){var o=aC.createOscillator(),g=aC.createGain();o.connect(g);g.connect(aC.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,aC.currentTime+d);g.gain.exponentialRampToValueAtTime(0.01,aC.currentTime+d+0.15);o.start(aC.currentTime+d);o.stop(aC.currentTime+d+0.15);});}catch(e){}}
var lH='',nOn=false;
function sRef(){if(!ST.role)return;var oP=ST.sols.filter(function(s){return s.estado==='Pendiente';}).length;var oR=ST.sols.filter(function(s){return s.estado==='Encontrado'||s.estado==='Vendido';}).length;var oH=lH;api({accion:'listar'}).then(function(r){if(r&&r.data)ST.sols=r.data.map(function(s){['archivos','archivosBuscador'].forEach(function(k){if(typeof s[k]==='string'&&s[k]){try{s[k]=JSON.parse(s[k]);}catch(e){s[k]=[];}}if(!Array.isArray(s[k]))s[k]=[];});s.estadoPrevio=s.estadoPrevio||'';s.buscadoresPrevios=s.buscadoresPrevios||'';return s;});var nH=ST.sols.map(function(x){return x.id+'|'+x.estado;}).join(',');if(oH&&nH!==oH&&nOn){var nP=ST.sols.filter(function(s){return s.estado==='Pendiente';}).length;var nR=ST.sols.filter(function(s){return s.estado==='Encontrado'||s.estado==='Vendido';}).length;if(ST.role==='buscador'&&nP>oP){beep();toast('🔔 Nueva solicitud');}else if(nR>oR){beep();toast('🔔 Actualización');}}lH=nH;renderAll();});}
document.addEventListener('click',function i(){nOn=true;try{if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();aC.resume();}catch(e){}document.removeEventListener('click',i);},{once:true});
document.addEventListener('click',function(e){var t=e.target;var rc=t.closest('.role-card');if(rc&&rc.dataset.role){selectRole(rc.dataset.role);return;}if(t.closest('#fileUploadBtn')){$('fileInput').click();return;}if(t.closest('#logoutBtn')){logout();return;}});
setInterval(sRef,10000);
if(load())enterApp();
</script>
</body>
